# Iris dataset configuration

dataset:
  name: "iris"
  test_size: 0.3
  random_state: 42

model:
  type: "random_forest"
  config:
    n_estimators: 100
    max_depth: null
    random_state: 42
    n_jobs: -1

testing:
  edge_case_test:
    n_cases: 15
  robustness_test:
    epsilon: 0.05
    n_samples: 50
  calibration_test:
    n_bins: 10

evaluation:
  metrics:
    - "accuracy"
    - "robustness_score"
    - "calibration_error"
    - "edge_case_performance"

logging:
  level: "INFO"
  log_file: "logs/iris_testing.log"

output:
  results_dir: "results/iris"
  assets_dir: "assets/iris"
  save_detailed_results: true
  save_leaderboard: true
