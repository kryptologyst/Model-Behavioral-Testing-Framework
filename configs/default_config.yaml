# Default configuration for model behavioral testing

# Dataset configuration
dataset:
  name: "iris"
  test_size: 0.3
  random_state: 42
  synthetic_config:
    n_samples: 1000
    n_features: 10
    n_classes: 3
    n_informative: 5

# Model configuration
model:
  type: "random_forest"
  config:
    n_estimators: 100
    max_depth: null
    random_state: 42
    n_jobs: -1

# Testing configuration
testing:
  edge_case_test:
    n_cases: 10
  robustness_test:
    epsilon: 0.1
    n_samples: 100
  calibration_test:
    n_bins: 10

# Evaluation configuration
evaluation:
  metrics:
    - "accuracy"
    - "robustness_score"
    - "calibration_error"
    - "edge_case_performance"
  leaderboard:
    sort_by: "overall_score"
    ascending: false

# Logging configuration
logging:
  level: "INFO"
  log_file: "logs/behavioral_testing.log"

# Output configuration
output:
  results_dir: "results"
  assets_dir: "assets"
  save_detailed_results: true
  save_leaderboard: true
